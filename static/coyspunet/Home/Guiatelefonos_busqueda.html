<script LANGUAGE="JavaScript">
function Validar(form)
{

  if (form.titular.value == "")
  { alert("Debe ingresar algo para buscar"); form.titular.focus(); return; }

  if (form.titular.value.length < 3)
  { alert("Al menos debe ingresar 3 caracteres"); form.titular.focus(); return; }


}
</script>

form.submit();

}

</script>
