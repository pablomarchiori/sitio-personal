<script LANGUAGE="JavaScript">

function Validar(form)
{
  if (form.EmailOrigen.value == "")
  { alert("Por favor ingrese su dirección de e-mail"); form.EmailOrigen.focus(); return; }

  if (form.sitio.value == "")
  { alert("Por favor ingrese su domicilio"); form.sitio.focus(); return; }

  if (form.sitio.value.indexOf('.', 0) == -1 ||
      form.sitio.value.indexOf('.', 0) == -1)
  { alert("URL de sitio inválida"); form.sitio.focus(); return; }

  if (form.EmailOrigen.value.indexOf('@', 0) == -1 ||
      form.EmailOrigen.value.indexOf('.', 0) == -1)
  { alert("Dirección de e-mail inválida"); form.EmailOrigen.focus(); return; }

  window.open('', 'SugieraLinkASP', 'WIDTH=500, HEIGHT=150');
  form.submit();

}

</script>
