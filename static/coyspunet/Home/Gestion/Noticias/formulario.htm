<html>

<head>
<title>Ingreso de Noticias</title>
<link href="../../style.css" rel="stylesheet" type="text/css">
<meta charset="utf-8">
<style id="coyspu-static-layout-fix">
td[width="451"], td[width="480"] { white-space: normal !important; overflow-wrap: break-word; }
</style>
</head>

<body leftmargin="25">
<h5>Ingreso de Noticias</h5>
<form method="POST" action="agrega_noticia.html">
  <p>Titulo:<br>
  <input type="text" name="titulo" size="40"></p>
  <p>Copete:<br>
  <input type="text" name="copete" size="40"></p>
  <p>Url:<br>
  <input type="text" name="direccion" size="40" value="http://www.coyspu.com.ar/coyspudigital"></p>
  <p>Ingrese la contraseña:<br>
  <input type="password" name="password" size="20"></p>
  <p><input type="submit" value="Ingresar noticia" name="enviar"></p>
</form>
</body>
</html>
