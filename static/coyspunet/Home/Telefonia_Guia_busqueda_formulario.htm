<script Language="JavaScript"><!--
function validartitular(formulario)
{
  if (formulario.titular.value.length < 3)
  {
    alert("Escriba al menos 3 letras.");
    formulario.titular.focus();
    return (false);
  }
  var checkOK = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZÁÉÍÓÚabcdefghijklmnñopqrstuvwxyzáéíóú0123456789  ";
  var checkStr = formulario.titular.value;
  var allValid = true;
  for (i = 0;  i < checkStr.length;  i++)
  {
    ch = checkStr.charAt(i);
    for (j = 0;  j < checkOK.length;  j++)
      if (ch == checkOK.charAt(j))
        break;
    if (j == checkOK.length)
    {
      allValid = false;
      break;
    }
  }
  if (!allValid)
  {
    alert("Solo se admiten letras o números.");
    formulario.titular.focus();
    return (false);
  }

  return (true);
}
//--></script>


<script Language="JavaScript"><!--
function validarportel(formulario)
{
  if (formulario.telefono.value.length < 4)
  {
    alert("Escriba todo el numero telefónico.");
    formulario.telefono.focus();
    return (false);
  }
  var checkOK = "0123456789";
  var checkStr = formulario.telefono.value;
  var allValid = true;
  for (i = 0;  i < checkStr.length;  i++)
  {
    ch = checkStr.charAt(i);
    for (j = 0;  j < checkOK.length;  j++)
      if (ch == checkOK.charAt(j))
        break;
    if (j == checkOK.length)
    {
      allValid = false;
      break;
    }
  }
  if (!allValid)
  {
    alert("Escriba sólo números.");
    formulario.telefono.focus();
    return (false);
  }

  return (true);
}
//--></script>
