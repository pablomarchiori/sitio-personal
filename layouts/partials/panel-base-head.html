<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111111;
    color: #f2f2f2;
    font-family: Arial, Helvetica, sans-serif;
    height: 100%;
    width: 100%;
  }

  body {
    overflow-x: hidden;
  }

  .panel {
    box-sizing: border-box;
    width: 100%;
    min-height: 100%;
    padding: 20px;
  }

  .top {
    text-align: center;
    margin-bottom: 20px;
    border-bottom: 1px solid #333333;
    padding-bottom: 15px;
  }

  .clock {
    font-size: 64px;
    font-weight: bold;
    line-height: 1;
    margin: 0 0 10px 0;
    color: #ffffff;
  }

  .date {
    font-size: 22px;
    color: #cccccc;
    margin: 0;
  }

  .main {
    width: 100%;
    overflow: hidden;
  }

  .left,
  .right {
    box-sizing: border-box;
    width: 48%;
    float: left;
    min-height: 200px;
  }

  .right {
    float: right;
  }

  .box {
    background: #1b1b1b;
    border: 1px solid #333333;
    padding: 15px;
    margin-bottom: 20px;
  }

  .box-title {
    font-size: 24px;
    font-weight: bold;
    margin: 0 0 15px 0;
    color: #ffffff;
  }

  .weather-line {
    font-size: 20px;
    margin-bottom: 10px;
    color: #dddddd;
  }

  .weather-temp {
    font-size: 44px;
    font-weight: bold;
    margin: 10px 0;
    color: #ffffff;
  }

  .weather-note {
    font-size: 18px;
    color: #bbbbbb;
  }

  .calendar-header {
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  table.calendar {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  table.calendar th,
  table.calendar td {
    border: 1px solid #333333;
    text-align: center;
    vertical-align: middle;
    height: 44px;
    font-size: 18px;
    padding: 0;
  }

  table.calendar th {
    background: #262626;
    color: #dddddd;
    font-weight: bold;
  }

  table.calendar td {
    background: #1a1a1a;
    color: #e5e5e5;
  }

  table.calendar td.other-month {
    color: #666666;
    background: #141414;
  }

  table.calendar td.today {
    background: #ffffff;
    color: #111111;
    font-weight: bold;
  }

  table.calendar td.holiday {
    background: #3a1f1f;
    color: #ffb3b3;
    font-weight: bold;
  }

  table.calendar td.today.holiday {
    background: #ffd9d9;
    color: #111111;
  }

  .holidays-list {
    margin: 0;
    padding-left: 20px;
  }

  .holidays-list li {
    margin-bottom: 8px;
    font-size: 18px;
    color: #dddddd;
  }

  .footer {
    clear: both;
    border-top: 1px solid #333333;
    padding-top: 12px;
    margin-top: 10px;
    font-size: 16px;
    color: #999999;
    text-align: center;
  }

  .small {
    font-size: 15px;
    color: #aaaaaa;
  }

  .status-ok {
    color: #9be49b;
  }

  .status-fail {
    color: #ff9999;
  }

  @media screen and (max-width: 900px) {
    .clock {
      font-size: 48px;
    }

    .date {
      font-size: 18px;
    }

    .left,
    .right {
      width: 100%;
      float: none;
    }

    table.calendar th,
    table.calendar td {
      height: 34px;
      font-size: 16px;
    }
  }
</style>
