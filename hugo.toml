baseURL = "https://www.marchiori.ar/"
languageCode = "es-ar"
title = "Pablo Marchiori"
theme = "congo"

defaultContentLanguage = "es"
disableLanguages = ["en"]
enableRobotsTXT = true
summaryLength = 30

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "Notas personales sobre lenguaje, IT, trabajo y organización"
  mainSections = ["notas", "site-log"]

[params.homepage]
  layout = "page"
  showRecent = true
  recentLimit = 6

[params.author]
  name = "Pablo Marchiori"
  image = "img/author.jpg"
  headline = "Notas personales sobre lenguaje, IT, trabajo y organización"
  bio = "Supervisor de infraestructura IT. Apuntes, ensayos y notas técnicas."
  
[caches]
[caches.images]
dir = ':cacheDir/images'

[[menus.main]]
name = "Notas"
pageRef = "notas"
weight = 10

[[menus.main]]
name = "Site Log"
pageRef = "site-log"
weight = 20